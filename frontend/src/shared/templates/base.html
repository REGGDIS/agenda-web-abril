<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title or app_name }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/base.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div>
        <strong>{{ app_name }}</strong>
        <p class="subtitle">Esqueleto inicial del proyecto</p>
      </div>
      <nav class="site-nav">
        <a href="/calendario">Inicio</a>
        <a href="/actividades/nueva">Nueva actividad</a>
        <a href="/login">Login</a>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ request.url_for('static', path='js/app.js') }}" defer></script>
    <script src="{{ request.url_for('static', path='js/tema.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
