{% extends "shared/templates/base.html" %}

{% block content %}
<section class="page-section">
  <div class="card login-card">
    <h1>Ingreso a Agenda Abril</h1>
    <p>Esta etapa valida el RUT completo y verifica si existe en la tabla <code>usuarios</code>.</p>

    <form id="login-form" class="login-form" novalidate>
      <label for="rut">RUT completo</label>
      <input
        id="rut"
        name="rut"
        type="text"
        placeholder="12.345.678-5"
        autocomplete="username"
      >
      <button id="login-submit-button" type="submit">Validar ingreso</button>
    </form>

    <div id="login-result" class="login-result" aria-live="polite"></div>
    <div id="login-success-actions" class="login-success-actions" hidden>
      <a href="/calendario" class="primary-action login-success-cta">Entrar al calendario</a>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ request.url_for('static', path='js/auth/login.js') }}" defer></script>
{% endblock %}
